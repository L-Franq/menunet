<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../cadastro.css" />
    <link
      rel="shortcut icon"
      href="../img/icon/icon.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="../vendor/animate.css" />
    <link
      rel="stylesheet"
      href="../vendor/fontawesome-free-7.2.0-web/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <title>MenuNet | Criar Conta</title>
  </head>
  <body>
    <div class="register-container animate__animated animate__fadeInUp">
      <form id="formCadastro" action="">
        <h1>cadastre-se</h1>

        <div class="input-group">
          <input id="nome" required placeholder="Nome do estabelecimento" type="text" />
        </div>

        <div class="input-group">
          <input id="slug" required placeholder="Nome do menu" type="text" />
        </div>

        <div class="input-group">
          <input id="email" required placeholder="exemplo@gmail.com" type="email" />
        </div>

        <div class="input-group">
          <input id="senha" required placeholder="Senha" type="password" />
        </div>

        <div class="input-group">
          <input id="senhaConfirm" required placeholder="Confirme a senha" type="password" />
        </div>
        <p class="hidden" id="erro" style="color: tomato; font-size: 14px; margin: 5px; text-align: center;"></p>
        <button type="submit">CADASTRAR</button>

        <p class="footer-link">Já tem uma conta? <a href="/m/login">Faça login</a></p>
      </form>
    </div>
  </body>
</html>
